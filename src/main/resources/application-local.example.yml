spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/copier_v0?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: change_me
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0

copier:
  security:
    credentials:
      secret: change_me_to_a_strong_secret
  account-config:
    route-cache:
      backend: redis
      key-prefix: copy
  mt5:
    signal-ingest:
      bearer-token: change_me
      dedup-backend: redis
      dedup-key-prefix: copy:signal:dedup
    follower-exec:
      bearer-token: change_me
      heartbeat-stale-after: PT15S
      realtime-dispatch:
        backend: redis
        channel: copy:follower:dispatch
  monitor:
    heartbeat-stale-after: PT10S
    runtime-state:
      backend: redis
      key-prefix: copy:runtime
      database-sync-interval: PT30S
      funds-stale-after: PT30S
      require-fresh-funds-for-ratio: true
      warmup-on-startup: true
    session-registry:
      backend: redis
      key-prefix: copy:ws
      ttl: PT2M
  copy-engine:
    slippage:
      enabled: false
      fx-and-gold-max-pips: 10
      other-symbol-max-price: 20.0
