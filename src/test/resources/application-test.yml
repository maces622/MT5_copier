spring:
  datasource:
    url: jdbc:h2:mem:copier_v0_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

copier:
  account-config:
    route-cache:
      backend: log
  mt5:
    signal-ingest:
      dedup-backend: memory
    follower-exec:
      realtime-dispatch:
        backend: local
  monitor:
    session-registry:
      backend: memory
